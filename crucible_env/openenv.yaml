type: space
runtime: fastapi
app: server.app:app
port: 8000
name: crucible-env
description: >
  CRUCIBLE — Self-improving RL environment where the training curriculum
  is an emergent property of failure. Four agents: Executor solves
  procurement compliance tasks (FAR/DFARS/EU Directive 2014/24/EU) at
  AXIOM Corporation; Arbiter scores with partial credit across 5 axes
  plus counterfactual consequences; Architect generates the next task
  targeting the weakest axis; Vendor (adversarial) crafts contracts that
  hide violations from the Executor. Mid-episode Regulation Shocks test
  distribution-shift adaptation. The environment has no ceiling.
env:
  USE_ARCHITECT: "false"
  USE_ADVERSARIAL: "false"
  USE_SHOCKS: "false"
  SHOCK_PROBABILITY: "0.25"
  JURISDICTION: "FAR"
tags:
  - self-improvement
  - multi-agent
  - adversarial
  - procurement
  - enterprise
  - adaptive-curriculum
  - regulation-shock
  - multi-jurisdiction
  - rl-training
  - openenv
