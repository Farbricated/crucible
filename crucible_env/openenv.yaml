type: space
runtime: fastapi
app: server.app:app
port: 8000
name: crucible-env
description: >
  CRUCIBLE - Self-improving RL environment where the training curriculum
  is generated by the agent's own failure history. Three agents: Executor
  solves procurement compliance tasks at AXIOM Corporation, Arbiter scores
  with partial credit across 5 axes, Architect reads failure history and
  generates the next task targeting the exact weak spot. The curriculum
  is an emergent property of failure - no ceiling.
tags:
  - self-improvement
  - multi-agent
  - procurement
  - enterprise
  - adaptive-curriculum
  - rl-training
